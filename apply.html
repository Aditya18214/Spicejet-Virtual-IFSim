<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply - SpiceJet Virtual</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#ffffff;
padding-top:60px;
}

/* NAVBAR (LEFT ALIGNED) */
nav{
position:fixed;
width:100%;
top:0;
background:#c40000;
color:white;
display:flex;
justify-content:flex-start;
align-items:center;
padding:10px 6%;
z-index:1000;
}

nav h1{
font-size:18px;
}

/* SECTION */
.section{
padding:70px 10%;
text-align:center;
}

.section h2{
color:#c40000;
font-size:32px;
}

/* FORM CARD */
.form-box{
max-width:500px;
margin:40px auto;
background:#f6f6f6;
padding:30px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

/* INPUTS */
input, textarea{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
outline:none;
transition:0.3s;
}

input:focus, textarea:focus{
border-color:#c40000;
box-shadow:0 0 5px rgba(196,0,0,0.3);
}

textarea{
resize:none;
}

/* BUTTON */
button{
margin-top:20px;
padding:14px;
width:100%;
border:none;
background:linear-gradient(45deg,#c40000,#ff4d4d);
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* FOOTER */
footer{
margin-top:60px;
background:#c40000;
color:white;
padding:20px;
text-align:center;
}

/* MOBILE */
@media(max-width:600px){
nav{
padding:8px 5%;
}
nav h1{
font-size:16px;
}
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
<h1>✈ SpiceJet Virtual IF</h1>
</nav>

<!-- SECTION -->
<section class="section">

<h2>Pilot Application</h2>
<p>Start your journey with SpiceJet Virtual</p>

<div class="form-box">

<form action="https://formsubmit.co/adityakushwah1516@gmail.com" method="POST">

<input type="text" name="Full Name" placeholder="Full Name" required>

<input type="email" name="Email" placeholder="Email Address" required>

<input type="number" name="Age" placeholder="Age" required>

<input type="text" name="Infinite Flight Grade" placeholder="Infinite Flight Grade" required>

<input type="number" name="Total Flight Hours" placeholder="Total Flight Hours" required>

<input type="text" name="Discord Username" placeholder="Discord Username" required>

<textarea name="Reason" placeholder="Why do you want to join SpiceJet Virtual?" rows="5" required></textarea>

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Pilot Application">

<button type="submit">Submit Application</button>

</form>

</div>

</section>

<!-- FOOTER -->
<footer>
© SpiceJet Virtual is an independent Virtual Airline and not affiliated with any real-world airline.
</footer>

</body>
</html>
