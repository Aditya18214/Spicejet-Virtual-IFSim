<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpiceJet Virtual - Application Submitted</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #d90429, #ff6b35);
  overflow: hidden;
}

.container {
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(12px);
  padding: 40px;
  border-radius: 25px;
  text-align: center;
  width: 90%;
  max-width: 700px;
  color: white;
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  animation: fadeIn 1s ease-in-out;
}

h1 {
  font-size: 3rem;
  margin-bottom: 20px;
}

p {
  font-size: 1.2rem;
  line-height: 1.8;
  margin-bottom: 15px;
}

.highlight {
  font-weight: bold;
  color: #ffe66d;
}

.emoji {
  font-size: 3rem;
  margin-bottom: 15px;
  animation: float 2s infinite ease-in-out;
}

.footer {
  margin-top: 20px;
  font-size: 0.95rem;
  opacity: 0.9;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes float {
  0% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-8px);
  }
  100% {
    transform: translateY(0px);
  }
}

@media (max-width: 600px) {
  h1 {
    font-size: 2.2rem;
  }

  p {
    font-size: 1rem;
  }
}

  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">✈️</div>
    <h1>Application Submitted!</h1>
    <p>
      Thank you for submitting your <span class="highlight">SpiceJet Virtual Pilot Application Form</span>.
    </p>
    <p>
      Our staff team will contact you on your <span class="highlight">Infinite Flight Community</span> account within the next <span class="highlight">24 hours</span>.
    </p>
    <p>
      Stay tuned and get ready to fly with SpiceJet Virtual! 🔥
    </p>
    <div class="footer">
  
</body>
</html>
